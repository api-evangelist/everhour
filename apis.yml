  - Events
  - Automation
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://everhour.docs.apiary.io/#reference/webhooks
  baseURL: https://api.everhour.com
  properties:
  - url: https://everhour.docs.apiary.io/#reference/webhooks
    type: APIReference
  - url: openapi/everhour-openapi.yml
    type: OpenAPI
  description: Subscribe to change notifications - create, get, update, and
    delete webhook subscriptions for project, task, section, client, estimate,
    timer started/stopped, and time updated events, optionally scoped to a
    single project, with X-Hook-Secret target URL verification.
