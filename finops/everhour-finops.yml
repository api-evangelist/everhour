description: >-
  FinOps view of Everhour spend. Everhour is a seat-based SaaS subscription -
  the API itself carries no usage charge, so the cost driver is the number of
  active seats on the Team plan ($8.50 per user per month billed annually,
  roughly $10 billed monthly, 5-seat minimum) or a negotiated Custom agreement
  at 50+ seats. A Free plan covers up to 5 seats with limited features.
  Because Everhour is itself a time, budget, and expense tracking system, the
  API doubles as a FinOps data source - project budgets, billable amounts,
  labor costs, expenses, and profit can be pulled from the reports dashboards
  for cost allocation in your own tooling.
notes: >-
  Seat counts are the only Everhour meter to manage; API call volume affects
  rate limits, not billing. Verify current per-seat rates on the Everhour
  pricing page during reconciliation.
