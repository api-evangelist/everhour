principles:
- name: Visibility
  description: Track active vs licensed seats monthly; use the Everhour reports API (dashboards for projects, clients, users) to surface labor costs, billable amounts, and profit for downstream FinOps reporting.
- name: Allocation
  description: Map Everhour projects and clients to internal cost centers so tracked time and expenses allocate cleanly; seat costs allocate per team member.
- name: Optimization
  description: Remove inactive seats before renewal, choose annual billing for the 15% discount, and stay on Free while at 5 or fewer seats with basic needs.
- name: Accountability
  description: Assign an owner for the Everhour subscription who reviews seat counts and plan fit each billing cycle.
