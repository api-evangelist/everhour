aid: everhour
name: Everhour
review:
  question: Does Everhour expose a documented public WebSocket API?
  answer: false
  date: '2026-07-11'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Everhour's public API
    (https://api.everhour.com, documented on Apiary) is request/response REST
    over HTTPS - there is no server-push transport (WebSocket or SSE) on
    Everhour's own API to model. Everhour does support webhooks (POST /hooks)
    that deliver project, task, timer, time, section, client, and estimate
    events to a customer-supplied HTTPS endpoint, but those are
    server-to-endpoint HTTP callbacks, not a WebSocket or SSE surface.
findings:
  summary: |
    Everhour does not publish a documented public WebSocket API. The Everhour
    API is a RESTful JSON interface at https://api.everhour.com (labeled BETA
    by Everhour, versioned via the optional X-Accept-Version header, current
    version 1.2), authenticated with a per-user API key in the X-Api-Key
    header. Every documented surface - time records, timers, timecards,
    timesheets and approvals, projects, sections, tasks, estimates, custom
    fields, schedule assignments, time off types and allocations, clients,
    invoices, expenses, dashboards/reports, users, and webhooks - is plain
    request/response REST over HTTPS. Even live timers are polled via
    GET /timers/current and GET /team/timers rather than streamed. The only
    push mechanism is webhooks: subscriptions created via POST /hooks with
    X-Hook-Secret target URL verification, delivering events such as
    api:timer:started, api:timer:stopped, and api:time:updated as HTTP POSTs
    to the customer's endpoint. No realtime, bidirectional, or streaming
    WebSocket (ws:// or wss://) endpoint is documented anywhere in the API
    reference as of the review date.
  accessModel: |
    API access is included with any Everhour account, including the Free plan
    (up to 5 seats). Every user finds a personal API key at the bottom of
    their profile page in the Everhour app; there is no separate developer
    signup, OAuth flow, or API-specific fee. Rate limiting is roughly 20
    requests per 10 seconds per API key (429 plus Retry-After when exceeded)
    and Everhour asks integrators to get in touch before running large
    batches of requests.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.everhour.com
      documented: true
      note: Full JSON REST API documented on Apiary (API Blueprint). X-Api-Key header auth; optional X-Accept-Version header (current 1.2).
    - protocol: Webhook
      scheme: https
      documented: true
      note: POST /hooks subscriptions deliver 15 event types (project, task, timer, time, section, client, estimate changes) to a customer HTTPS endpoint with X-Hook-Secret verification. Server-to-endpoint HTTP, not WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in the Everhour API reference as of the review date.
    - protocol: SSE
      scheme: https
      documented: false
      note: No Server-Sent Events streaming surface is documented; running timers are polled via GET /timers/current.
