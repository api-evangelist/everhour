actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or SSE protocol surface exists on Everhour's public API - it
    is request/response REST over HTTPS plus outbound webhooks. No AsyncAPI
    document was created because there is no server-push transport on
    Everhour's own API to model; webhook deliveries are HTTP callbacks to
    customer infrastructure.
